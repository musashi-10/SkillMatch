<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="skillmatch-api-base" content="https://skillmatch-njuf.onrender.com"/>
<title>SkillMatch · AI Job Recommender</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#0F62FE;--brand-2:#6929C4;--accent:#08BDBA;
  --bg:#060A12;--surface:#0D1526;--surface-2:#121E35;
  --border:rgba(255,255,255,.08);--border-hover:rgba(255,255,255,.18);
  --text:#F0F4FF;--muted:#6B82A8;--subtle:#2A3A55;
  --success:#24A148;--warning:#F1C21B;--danger:#DA1E28;
  --premium:#FFB000;
  --radius:14px;--radius-sm:8px;
  font-size:16px;
}
body{background:var(--bg);color:var(--text);font-family:'Instrument Sans',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4,h5{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;line-height:1.1}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--subtle);border-radius:9px}
input,select,textarea{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:.9rem;padding:.65rem 1rem;transition:border-color .2s,box-shadow .2s;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(15,98,254,.15)}
input::placeholder,textarea::placeholder{color:var(--muted)}
select option{background:var(--surface-2)}
button{cursor:pointer;font-family:'Bricolage Grotesque',sans-serif;font-weight:600;border:none;border-radius:var(--radius-sm);transition:all .18s;font-size:.88rem}
.btn-primary{background:var(--brand);color:#fff;padding:.65rem 1.4rem}
.btn-primary:hover{background:#0050E6;transform:translateY(-1px)}
.btn-secondary{background:transparent;color:var(--text);border:1px solid var(--border);padding:.6rem 1.3rem}
.btn-secondary:hover{border-color:var(--border-hover);background:var(--surface-2)}
.btn-danger{background:rgba(218,30,40,.15);color:#FF8389;border:1px solid rgba(218,30,40,.35);padding:.5rem 1rem;font-size:.82rem}
.btn-danger:hover{background:rgba(218,30,40,.28);border-color:rgba(218,30,40,.55);color:#fff}
.btn-ghost{background:transparent;color:var(--muted);padding:.5rem .9rem}
.btn-ghost:hover{color:var(--text);background:var(--surface-2)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem 1.6rem;transition:border-color .2s}
.card:hover{border-color:var(--border-hover)}
.badge{display:inline-flex;align-items:center;border-radius:999px;font-size:.72rem;font-weight:600;letter-spacing:.05em;padding:.2rem .7rem;border:1px solid}
.tag{background:rgba(15,98,254,.1);border:1px solid rgba(15,98,254,.25);border-radius:999px;color:#7EB3FF;font-size:.72rem;padding:.2rem .65rem}
.skill-match-bar{height:4px;background:var(--subtle);border-radius:9px;overflow:hidden}
.skill-match-fill{height:100%;border-radius:9px;transition:width .5s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both}
.skeleton{background:linear-gradient(90deg,var(--surface-2) 25%,var(--subtle) 50%,var(--surface-2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--radius-sm)}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
.nav{align-items:center;background:rgba(6,10,18,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;gap:1rem;padding:.8rem 2rem;position:sticky;top:0;z-index:100;justify-content:space-between}
.nav-brand{font-family:'Bricolage Grotesque',sans-serif;font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,#5B8DFF,#08BDBA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 5rem}
.hero-gradient{background:radial-gradient(ellipse 70% 40% at 50% -5%,rgba(15,98,254,.18),transparent)}
.match-ring{display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:50%;font-family:'Bricolage Grotesque',sans-serif;font-size:.95rem;font-weight:800;flex-shrink:0}
.tab-bar{border-bottom:1px solid var(--border);display:flex;gap:0;margin-bottom:1.6rem}
.tab{background:none;border:none;border-bottom:2px solid transparent;border-radius:0;color:var(--muted);font-size:.9rem;font-weight:500;padding:.65rem 1.2rem;transition:all .18s}
.tab.active{border-bottom-color:var(--brand);color:var(--text)}
.tab:hover:not(.active){color:var(--text)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
@media(max-width:700px){.grid-2,.grid-3{grid-template-columns:1fr}.nav{padding:.7rem 1rem}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;text-align:center}
.stat-num{font-family:'Bricolage Grotesque',sans-serif;font-size:1.6rem;font-weight:800;color:var(--accent)}
.stat-lbl{color:var(--muted);font-size:.75rem;letter-spacing:.06em;margin-top:.3rem;text-transform:uppercase}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--surface-2);border:1px solid var(--border-hover);border-radius:var(--radius-sm);padding:.75rem 1.2rem;font-size:.88rem;z-index:999;animation:fadeUp .3s ease both;max-width:320px}
.section-label{color:var(--muted);font-size:.75rem;font-weight:600;letter-spacing:.12em;margin-bottom:.6rem;text-transform:uppercase}
.divider{border:none;border-top:1px solid var(--border);margin:1.8rem 0}
.file-upload-wrap{display:flex;align-items:center;gap:.7rem;min-width:0}
.file-upload-input{display:none}
.file-upload-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:.58rem .95rem;font-size:.84rem;font-weight:600;cursor:pointer;transition:border-color .2s,background .2s;white-space:nowrap}
.file-upload-btn:hover{border-color:var(--border-hover);background:#16233a}
.file-upload-name{font-size:.8rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:320px}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const API = (() => {
  const el = document.querySelector('meta[name="skillmatch-api-base"]');
  const raw = el ? el.getAttribute("content") : null;

  // ✅ If explicitly set (production)
  if (raw && raw.trim() !== "") {
    return raw.trim();
  }

  // ✅ Local development
  if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
    return "http://127.0.0.1:8000";
  }

  // ✅ Default → same origin (Render)
  return window.location.origin;
})();
// ── API helpers ───────────────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  try {
    const isFormData = opts?.body instanceof FormData;
    const res = await fetch(API + path, {
      headers: isFormData ? {} : { "Content-Type": "application/json" },
      ...opts,
    });
    return await res.json();
  } catch (e) {
    return { error: e.message };
  }
}

// ── Utility components ────────────────────────────────────────────────────────
function Spinner() {
  return <span className="spinner" />;
}

function Toast({ msg, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
  return <div className="toast">{msg}</div>;
}

function MatchRing({ score }) {
  const color = score >= 70 ? "#08BDBA" : score >= 40 ? "#5B8DFF" : "#6B82A8";
  return (
    <div className="match-ring" style={{ border: `2.5px solid ${color}`, color }}>
      {score}%
    </div>
  );
}

function SkillTag({ label }) {
  return <span className="tag">{label}</span>;
}

function WorkBadge({ mode }) {
  const map = {
    remote:   { bg: "rgba(8,189,186,.1)",  border: "rgba(8,189,186,.3)",  color: "#08BDBA" },
    hybrid:   { bg: "rgba(241,194,27,.1)", border: "rgba(241,194,27,.3)", color: "#F1C21B" },
    onsite:   { bg: "rgba(105,41,196,.1)", border: "rgba(105,41,196,.3)", color: "#BE95FF" },
    "on-site":{ bg: "rgba(105,41,196,.1)", border: "rgba(105,41,196,.3)", color: "#BE95FF" },
  };
  const s = map[mode?.toLowerCase()] || map.onsite;
  return (
    <span className="badge" style={{ background: s.bg, borderColor: s.border, color: s.color }}>
      {mode}
    </span>
  );
}

function TypeBadge({ type }) {
  const map = {
    "full-time": { bg: "rgba(15,98,254,.1)",  border: "rgba(15,98,254,.3)",  color: "#7EB3FF" },
    "part-time": { bg: "rgba(105,41,196,.1)", border: "rgba(105,41,196,.3)", color: "#BE95FF" },
    internship:  { bg: "rgba(255,176,0,.1)",  border: "rgba(255,176,0,.3)",  color: "#FFB000" },
    contract:    { bg: "rgba(218,30,40,.1)",  border: "rgba(218,30,40,.3)",  color: "#FF8389" },
  };
  const s = map[type?.toLowerCase()] || map["full-time"];
  return (
    <span className="badge" style={{ background: s.bg, borderColor: s.border, color: s.color }}>
      {type}
    </span>
  );
}

function ApplicationStageBadge({ stage }) {
  const s = (stage || "applied").toLowerCase();
  const map = {
    applied:   { bg: "rgba(15,98,254,.12)", border: "rgba(15,98,254,.35)", color: "#7EB3FF" },
    screening: { bg: "rgba(105,41,196,.12)", border: "rgba(105,41,196,.35)", color: "#BE95FF" },
    interview: { bg: "rgba(8,189,186,.12)", border: "rgba(8,189,186,.35)", color: "#08BDBA" },
    offer:     { bg: "rgba(36,161,72,.14)", border: "rgba(36,161,72,.4)", color: "#42BE65" },
    rejected:  { bg: "rgba(218,30,40,.12)", border: "rgba(218,30,40,.35)", color: "#FF8389" },
  };
  const t = map[s] || map.applied;
  return (
    <span className="badge" style={{ background: t.bg, borderColor: t.border, color: t.color, textTransform: "capitalize" }}>
      {s}
    </span>
  );
}

function JobCard({ job, matchScore, explanation, matchedSkills, rank, style, isSaved, onToggleSave, user, onApplyRecorded }) {
  const skills = (job.required_skills || "").split(/[,;]+/).map(s => s.trim()).filter(Boolean).slice(0, 6);
  const scoreColor = matchScore >= 70 ? "#08BDBA" : matchScore >= 40 ? "#5B8DFF" : "#6B82A8";

  return (
    <div className="card fade-up" style={{ ...(style || {}), position: "relative" }}>
      {job.is_premium && (
        <span style={{ position: "absolute", top: 12, right: 12, background: "rgba(255,176,0,.12)",
          border: "1px solid rgba(255,176,0,.35)", borderRadius: 999, padding: "2px 10px",
          fontSize: ".7rem", color: "#FFB000", fontWeight: 700, letterSpacing: ".06em" }}>
          ★ FEATURED
        </span>
      )}

      <div style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
        {matchScore !== undefined && <MatchRing score={matchScore} />}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: "'Bricolage Grotesque',sans-serif", fontWeight: 700,
            fontSize: "1.05rem", marginBottom: 3 }}>{job.job_title}</div>
          <div style={{ color: "var(--muted)", fontSize: ".88rem" }}>
            {job.company} · {job.location}
          </div>
        </div>
        {job.salary_range && (
          <div style={{ fontFamily: "'Bricolage Grotesque',sans-serif", fontWeight: 700,
            fontSize: ".85rem", color: "#5B8DFF", whiteSpace: "nowrap" }}>
            {job.salary_range}
          </div>
        )}
      </div>

      {matchScore !== undefined && matchScore > 0 && (
        <div style={{ marginTop: 10 }}>
          <div className="skill-match-bar">
            <div className="skill-match-fill" style={{ width: matchScore + "%", background: scoreColor }} />
          </div>
          <div style={{ fontSize: ".72rem", color: "var(--muted)", marginTop: 4 }}>
            {matchScore}% skill match
          </div>
        </div>
      )}

      {explanation && (
        <div style={{ background: "rgba(15,98,254,.06)", border: "1px solid rgba(15,98,254,.12)",
          borderRadius: 8, padding: ".65rem .9rem", marginTop: 10,
          fontSize: ".8rem", color: "#8AADFF", lineHeight: 1.6 }}>
          💡 {explanation}
        </div>
      )}
      {job.score_breakdown && (
        <div style={{ marginTop: 8, display: "flex", flexWrap: "wrap", gap: 6 }}>
          <span className="tag">skills {job.score_breakdown.skill_overlap}</span>
          <span className="tag">title +{job.score_breakdown.title_bonus}</span>
          <span className="tag">recency {job.score_breakdown.recency}</span>
          <span className="tag">activity {job.score_breakdown.behavior_boost}</span>
          {(job.score_breakdown.listing_boost || 0) > 0 && (
            <span className="tag" style={{ background: "rgba(105,41,196,.1)", borderColor: "rgba(105,41,196,.25)", color: "#BE95FF" }}>
              employer +{job.score_breakdown.listing_boost}
            </span>
          )}
        </div>
      )}

      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 }}>
        <WorkBadge mode={job.work_mode} />
        <TypeBadge type={job.job_type} />
        {job.apply_platform && (
          <span className="badge" style={{ background: "rgba(255,255,255,.04)",
            borderColor: "rgba(255,255,255,.1)", color: "var(--muted)" }}>
            {job.apply_platform}
          </span>
        )}
      </div>

      {skills.length > 0 && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginTop: 10 }}>
          {skills.map((s, i) => <SkillTag key={i} label={s} />)}
        </div>
      )}

      {job.description && (
        <div style={{ color: "var(--muted)", fontSize: ".83rem", lineHeight: 1.6, marginTop: 10 }}>
          {job.description.slice(0, 160)}{job.description.length > 160 ? "…" : ""}
        </div>
      )}

      <div style={{ display: "flex", gap: 8, marginTop: 14, alignItems: "center" }}>
        <a href={job.apply_link || "#"} target="_blank" rel="noopener noreferrer"
          onClick={async (e) => {
            const href = job.apply_link || "";
            if (user?.role === "job_seeker" && onApplyRecorded) {
              e.preventDefault();
              await onApplyRecorded(job);
              if (href) window.open(href, "_blank", "noopener,noreferrer");
            }
          }}
          style={{ display: "inline-flex", alignItems: "center", gap: 5,
            background: "var(--brand)", color: "#fff", borderRadius: 8,
            padding: ".45rem 1.1rem", fontSize: ".82rem", fontWeight: 700,
            textDecoration: "none", fontFamily: "'Bricolage Grotesque',sans-serif",
            transition: "background .18s" }}>
          Apply now ↗
        </a>
        <button className="btn-ghost" onClick={() => onToggleSave?.(job)}
          style={{ color: isSaved ? "#FFB000" : "var(--muted)", fontSize: ".85rem" }}>
          {isSaved ? "★ Saved" : "☆ Save"}
        </button>
        {job.posted_date && (
          <span style={{ fontSize: ".72rem", color: "var(--muted)", marginLeft: "auto" }}>
            {job.posted_date}
          </span>
        )}
      </div>
    </div>
  );
}

// ── Auth screens ──────────────────────────────────────────────────────────────
function AuthPage({ onLogin }) {
  const [tab, setTab] = useState("login");
  const [role, setRole] = useState("job_seeker");
  const [form, setForm] = useState({ name: "", email: "", password: "", company: "" });
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState(null);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  async function handleLogin(e) {
    e.preventDefault();
    setLoading(true); setMsg(null);
    const r = await apiFetch("/auth/login", {
      method: "POST",
      body: JSON.stringify({ email: form.email, password: form.password }),
    });
    setLoading(false);
    if (r.error) {
      setMsg({ type: "error", text: r.error || "Login failed" });
      return;
    }
    if (!r.ok || !r.user) {
      setMsg({ type: "error", text: r.message || "Invalid login response" });
      return;
    }
    onLogin(r.user, r.access_token || null);
  }
  async function handleRegister(e) {
    e.preventDefault();
    setLoading(true); setMsg(null);
    const r = await apiFetch("/auth/register", {
      method: "POST",
      body: JSON.stringify({ name: form.name, email: form.email,
        password: form.password, role, company_name: form.company }),
    });
    setLoading(false);
    setMsg({ type: r.ok ? "success" : "error", text: r.message });
  }

  return (
    <div className="hero-gradient" style={{ minHeight: "100vh", display: "flex",
      alignItems: "center", justifyContent: "center", padding: "2rem" }}>
      <div style={{ width: "100%", maxWidth: 440 }}>
        <div style={{ textAlign: "center", marginBottom: "2rem" }}>
          <div style={{ fontFamily: "'Bricolage Grotesque',sans-serif", fontSize: "1.5rem",
            fontWeight: 800, background: "linear-gradient(135deg,#5B8DFF,#08BDBA)",
            WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>
            SkillMatch
          </div>
          <div style={{ color: "var(--muted)", fontSize: ".9rem", marginTop: 6 }}>
            AI-powered job recommendations
          </div>
        </div>

        <div className="card" style={{ background: "rgba(13,21,38,.9)" }}>
          <div className="tab-bar" style={{ marginBottom: "1.4rem" }}>
            <button className={`tab ${tab === "login" ? "active" : ""}`}
              onClick={() => setTab("login")}>Sign in</button>
            <button className={`tab ${tab === "register" ? "active" : ""}`}
              onClick={() => setTab("register")}>Create account</button>
          </div>

          {tab === "login" ? (
            <form onSubmit={handleLogin} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <input type="email" placeholder="Email" value={form.email}
                onChange={e => set("email", e.target.value)} required />
              <input type="password" placeholder="Password" value={form.password}
                onChange={e => set("password", e.target.value)} required />
              <button type="submit" className="btn-primary"
                style={{ marginTop: 4, height: 44, borderRadius: 8, fontSize: ".95rem" }}>
                {loading ? <Spinner /> : "Sign in"}
              </button>
            </form>
          ) : (
            <form onSubmit={handleRegister} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <div style={{ display: "flex", gap: 8 }}>
                {["job_seeker","recruiter"].map(r => (
                  <button key={r} type="button"
                    onClick={() => setRole(r)}
                    style={{ flex: 1, padding: ".55rem", borderRadius: 8,
                      background: role === r ? "rgba(15,98,254,.15)" : "var(--surface-2)",
                      border: role === r ? "1.5px solid rgba(15,98,254,.5)" : "1px solid var(--border)",
                      color: role === r ? "#7EB3FF" : "var(--muted)", fontWeight: 600, fontSize: ".85rem" }}>
                    {r === "job_seeker" ? "👤 Job Seeker" : "🏢 Recruiter"}
                  </button>
                ))}
              </div>
              <input type="text" placeholder="Full name" value={form.name}
                onChange={e => set("name", e.target.value)} required />
              <input type="email" placeholder="Email" value={form.email}
                onChange={e => set("email", e.target.value)} required />
              <input type="password" placeholder="Password (min 8 chars)" value={form.password}
                onChange={e => set("password", e.target.value)} required />
              {role === "recruiter" && (
                <input type="text" placeholder="Company name" value={form.company}
                  onChange={e => set("company", e.target.value)} />
              )}
              <button type="submit" className="btn-primary"
                style={{ marginTop: 4, height: 44, borderRadius: 8, fontSize: ".95rem" }}>
                {loading ? <Spinner /> : "Create account"}
              </button>
            </form>
          )}

          {msg && (
            <div style={{ marginTop: 12, padding: ".7rem 1rem", borderRadius: 8, fontSize: ".85rem",
              background: msg.type === "error" ? "rgba(218,30,40,.08)" : "rgba(36,161,72,.08)",
              border: `1px solid ${msg.type === "error" ? "rgba(218,30,40,.3)" : "rgba(36,161,72,.3)"}`,
              color: msg.type === "error" ? "#FF8389" : "#42BE65" }}>
              {msg.text}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Job Seeker dashboard ──────────────────────────────────────────────────────
function SeekerDashboard({ user, onToast, savedJobs, onToggleSave }) {
  const [tab, setTab] = useState("recommend");
  const [skills, setSkills] = useState("");
  const [loading, setLoading] = useState(false);
  const [prediction, setPrediction] = useState(null);
  const [jobs, setJobs] = useState([]);
  const [stats, setStats] = useState(null);
  const [featured, setFeatured] = useState([]);
  const [filters, setFilters] = useState({ location: "Any", work_mode: "Any", job_type: "Any" });
  const [searched, setSearched] = useState(false);
  const [apps, setApps] = useState([]);
  const [alert, setAlert] = useState({ cadence: "weekly", location: "", work_mode: "", job_type: "", keywords: "", is_active: true });
  const [noteDrafts, setNoteDrafts] = useState({});
  const [reminders, setReminders] = useState({});

  useEffect(() => {
    apiFetch("/jobs/stats").then(r => !r.error && setStats(r));
    apiFetch("/jobs/random?n=4").then(r => !r.error && setFeatured(r));
    apiFetch(`/apply/history/${encodeURIComponent(user.email)}`).then(r => !r.error && setApps(r || []));
    apiFetch(`/alerts/${user.id}`).then(r => {
      if (!r.error && r.alert) setAlert({ ...r.alert, is_active: !!r.alert.is_active });
    });
  }, []);

  async function recordApply(job) {
    const profile = await apiFetch(`/profile/${user.id}`);
    const resume = profile?.resume_text || "";
    const r = await apiFetch("/apply", {
      method: "POST",
      body: JSON.stringify({
        job_id: job.id,
        name: user.name,
        email: user.email,
        resume_text: resume,
        cover_letter: "",
      }),
    });
    if (r.error) { onToast("Network: " + r.error); return; }
    if (r.ok) {
      onToast(r.message || "Application recorded");
      const refreshed = await apiFetch(`/apply/history/${encodeURIComponent(user.email)}`);
      if (!refreshed.error) setApps(refreshed || []);
    } else {
      onToast(r.message || "Could not record application");
    }
  }

  async function handlePredict(e) {
    e.preventDefault();
    if (!skills.trim()) return;
    setLoading(true); setPrediction(null); setJobs([]);
    const r = await apiFetch("/jobs/recommend", {
      method: "POST",
      body: JSON.stringify({
        skills,
        user_id: user.id,
        location: filters.location === "Any" ? null : filters.location,
        work_mode: filters.work_mode === "Any" ? null : filters.work_mode.toLowerCase(),
        job_type: filters.job_type === "Any" ? null : filters.job_type.toLowerCase(),
        limit: 20,
      }),
    });
    setLoading(false);
    if (r.error) { onToast("API error: " + r.error); return; }
    setPrediction({ top_prediction: r.top_prediction, results: r.predictions || [] });
    setJobs(r.jobs || []);
    setSearched(true);
  }

  const matchMap = {};
  if (prediction?.results) {
    prediction.results.forEach(r => { matchMap[r.role.toLowerCase()] = r; });
  }

  function getJobMatch(job) {
    const title = job.job_title?.toLowerCase();
    for (const [role, data] of Object.entries(matchMap)) {
      if (title?.includes(role) || role.includes(title)) return data;
    }
    return null;
  }

  return (
    <div className="page">
      {/* Stats strip */}
      {stats && (
        <div className="grid-3" style={{ marginBottom: "1.8rem" }}>
          {[
            { num: stats.total?.toLocaleString(), lbl: "Jobs in DB" },
            { num: Object.keys(stats.by_type || {}).length, lbl: "Job types" },
            { num: Object.keys(stats.by_mode || {}).length, lbl: "Work modes" },
          ].map((s, i) => (
            <div key={i} className="stat-card fade-up" style={{ animationDelay: i * .07 + "s" }}>
              <div className="stat-num">{s.num}</div>
              <div className="stat-lbl">{s.lbl}</div>
            </div>
          ))}
        </div>
      )}

      <div className="tab-bar">
        {["recommend","browse","saved","applications","alerts","profile"].map(t => (
          <button key={t} className={`tab ${tab === t ? "active" : ""}`}
            onClick={() => setTab(t)}>
            {{ recommend: "🎯 AI Recommend", browse: "🔍 Browse Jobs", saved: "★ Saved", applications: "📌 Applications", alerts: "🔔 Alerts", profile: "📄 Resume Profile" }[t]}
          </button>
        ))}
      </div>

      {/* RECOMMEND TAB */}
      {tab === "recommend" && (
        <div>
          <form onSubmit={handlePredict} style={{ marginBottom: "1.8rem" }}>
            <div className="section-label">Your skills</div>
            <textarea rows={3} placeholder="e.g. Python, machine learning, pandas, data visualization, SQL…"
              value={skills} onChange={e => setSkills(e.target.value)}
              style={{ marginBottom: 10, resize: "vertical" }} />
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {["python sql data analysis", "react javascript typescript node",
                "machine learning deep learning tensorflow",
                "java spring microservices docker"].map(s => (
                <button key={s} type="button" className="btn-ghost"
                  style={{ fontSize: ".78rem", border: "1px solid var(--border)", borderRadius: 999,
                    padding: ".25rem .8rem" }}
                  onClick={() => setSkills(s)}>
                  {s}
                </button>
              ))}
            </div>
            <button type="submit" className="btn-primary"
              style={{ marginTop: 12, height: 44, minWidth: 160, display: "flex",
                alignItems: "center", justifyContent: "center", gap: 8 }}>
              {loading ? <><Spinner /> Analyzing…</> : "✨ Get Recommendations"}
            </button>
          </form>

          {/* Prediction results */}
          {prediction?.results?.length > 0 && (
            <div className="card fade-up" style={{ marginBottom: "1.8rem" }}>
              <div className="section-label">Top role predictions</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {prediction.results.map((r, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 14,
                    padding: ".85rem", background: "var(--surface-2)",
                    borderRadius: 10, border: i === 0 ? "1px solid rgba(15,98,254,.3)" : "1px solid transparent" }}>
                    <div style={{ textAlign: "center", minWidth: 42 }}>
                      <div style={{ fontFamily: "'Bricolage Grotesque',sans-serif",
                        fontWeight: 800, color: i === 0 ? "#5B8DFF" : "var(--muted)",
                        fontSize: "1.1rem" }}>{r.confidence}%</div>
                      <div style={{ fontSize: ".65rem", color: "var(--muted)", letterSpacing: ".06em" }}>CONF</div>
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontFamily: "'Bricolage Grotesque',sans-serif" }}>
                        {i + 1}. {r.role}
                      </div>
                      <div style={{ fontSize: ".8rem", color: "var(--muted)", marginTop: 2 }}>
                        {r.explanation}
                      </div>
                      {r.matched_skills?.length > 0 && (
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 6 }}>
                          {r.matched_skills.map((s, j) => (
                            <span key={j} style={{ background: "rgba(8,189,186,.1)",
                              border: "1px solid rgba(8,189,186,.25)", borderRadius: 999,
                              fontSize: ".7rem", padding: ".15rem .55rem", color: "#08BDBA" }}>
                              ✓ {s}
                            </span>
                          ))}
                        </div>
                      )}
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: ".75rem", color: "var(--muted)" }}>skill overlap</div>
                      <div style={{ fontFamily: "'Bricolage Grotesque',sans-serif",
                        fontWeight: 800, color: "#08BDBA", fontSize: "1rem" }}>
                        {r.skill_overlap}%
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Job results */}
          {searched && (
            <div>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center",
                marginBottom: "1rem" }}>
                <div className="section-label" style={{ margin: 0 }}>
                  {jobs.length} recommended jobs
                </div>
              </div>
              {jobs.length === 0 ? (
                <div style={{ textAlign: "center", color: "var(--muted)", padding: "3rem",
                  background: "var(--surface)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
                  No jobs found. Try broadening your search.
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  {jobs.map((job, i) => {
                    const match = getJobMatch(job);
                    return <JobCard key={job.id} job={job}
                      matchScore={job.recommendation_score ?? match?.skill_overlap}
                      explanation={job.recommend_explain || match?.explanation || (job.match_score !== undefined
                        ? `Matched ${job.match_score}% of required job skills.`
                        : undefined)}
                      matchedSkills={job.matched_skills || match?.matched_skills}
                      rank={i + 1}
                      isSaved={savedJobs.some(s => s.id === job.id)}
                      onToggleSave={onToggleSave}
                      user={user}
                      onApplyRecorded={recordApply}
                      style={{ animationDelay: Math.min(i, 8) * .06 + "s" }} />;
                  })}
                </div>
              )}
            </div>
          )}

          {/* Featured when no search */}
          {!searched && featured.length > 0 && (
            <div>
              <div className="section-label">Featured listings</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {featured.map((job, i) => (
                  <JobCard key={job.id} job={job}
                    isSaved={savedJobs.some(s => s.id === job.id)}
                    onToggleSave={onToggleSave}
                    user={user}
                    onApplyRecorded={recordApply}
                    style={{ animationDelay: i * .07 + "s" }} />
                ))}
              </div>
            </div>
          )}
        </div>
      )}

      {/* BROWSE TAB */}
      {tab === "browse" && (
        <BrowseTab
          onToast={onToast}
          savedJobs={savedJobs}
          onToggleSave={onToggleSave}
          user={user}
          onApplyRecorded={recordApply}
        />
      )}

      {/* SAVED TAB */}
      {tab === "saved" && (
        savedJobs.length === 0 ? (
          <div style={{ textAlign: "center", padding: "3rem", color: "var(--muted)" }}>
            <div style={{ fontSize: "2rem", marginBottom: 10 }}>★</div>
            <div>Your saved jobs will appear here.</div>
            <div style={{ fontSize: ".85rem", marginTop: 6 }}>
              Click "Save" on any job card to add it.
            </div>
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div className="section-label">{savedJobs.length} saved jobs</div>
            {savedJobs.map((job, i) => (
              <JobCard
                key={job.id}
                job={job}
                isSaved={true}
                onToggleSave={onToggleSave}
                user={user}
                onApplyRecorded={recordApply}
                style={{ animationDelay: Math.min(i, 8) * .05 + "s" }}
              />
            ))}
          </div>
        )
      )}
      {tab === "applications" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div className="section-label">Application tracker · {apps.length} {apps.length === 1 ? "role" : "roles"}</div>
          {apps.length === 0 ? (
            <div style={{ textAlign: "center", padding: "3rem 1.5rem", color: "var(--muted)",
              background: "var(--surface)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
              <div style={{ fontSize: "2rem", marginBottom: 10 }}>📋</div>
              <div style={{ fontFamily: "'Bricolage Grotesque',sans-serif", fontWeight: 700, color: "var(--text)", marginBottom: 6 }}>No applications yet</div>
              <div style={{ fontSize: ".88rem", maxWidth: 360, margin: "0 auto", lineHeight: 1.5 }}>
                Apply from <b style={{ color: "var(--text)" }}>Browse</b> or <b style={{ color: "var(--text)" }}>AI Recommend</b> — your pipeline shows up here.
              </div>
            </div>
          ) : apps.map((a, i) => {
            const st = (a.stage || "applied").toLowerCase();
            return (
              <div key={a.id} className="card fade-up" style={{
                animationDelay: Math.min(i, 10) * .05 + "s",
                background: "linear-gradient(145deg, var(--surface) 0%, rgba(13,21,38,.92) 100%)",
                borderColor: "rgba(255,255,255,.06)",
                boxShadow: "0 8px 32px rgba(0,0,0,.2)",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12, flexWrap: "wrap" }}>
                  <div style={{ flex: "1 1 200px", minWidth: 0 }}>
                    <div style={{ fontFamily: "'Bricolage Grotesque',sans-serif", fontWeight: 700, fontSize: "1.05rem", lineHeight: 1.25, marginBottom: 6 }}>
                      {a.job_title}
                    </div>
                    <div style={{ color: "var(--muted)", fontSize: ".86rem", display: "flex", flexWrap: "wrap", gap: "6px 12px", alignItems: "center" }}>
                      <span>{a.company || "—"}</span>
                      <span style={{ opacity: .45 }}>·</span>
                      <span>Applied {a.applied_at?.slice(0, 10) || "—"}</span>
                      {a.app_source === "catalog" && <span className="tag" style={{ fontSize: ".68rem" }}>Catalog</span>}
                      {a.app_source === "recruiter" && <span className="tag" style={{ fontSize: ".68rem", background: "rgba(105,41,196,.1)", borderColor: "rgba(105,41,196,.25)", color: "#BE95FF" }}>Company post</span>}
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                    <ApplicationStageBadge stage={st} />
                    <button type="button" className="btn-danger" title="Remove from tracker" onClick={async () => {
                      if (!window.confirm("Remove this application from your tracker? This cannot be undone.")) return;
                      const res = await apiFetch(`/applications/${a.id}?email=${encodeURIComponent(user.email)}`, { method: "DELETE" });
                      if (res.ok) {
                        onToast(res.message || "Application removed");
                        setReminders(r => { const x = { ...r }; delete x[a.id]; return x; });
                        setNoteDrafts(n => { const x = { ...n }; delete x[a.id]; return x; });
                        const refreshed = await apiFetch(`/apply/history/${encodeURIComponent(user.email)}`);
                        if (!refreshed.error) setApps(refreshed || []);
                      } else {
                        onToast(res.message || "Could not remove application");
                      }
                    }}>Delete</button>
                  </div>
                </div>

                <div style={{ borderTop: "1px solid var(--border)", margin: "14px 0 12px" }} />

                <div style={{ fontSize: ".72rem", fontWeight: 600, letterSpacing: ".08em", color: "var(--muted)", textTransform: "uppercase", marginBottom: 8 }}>Stage</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {["applied","screening","interview","offer","rejected"].map(s => (
                    <button key={s} type="button"
                      className={st === s ? "btn-secondary" : "btn-ghost"}
                      style={st === s ? { borderColor: "rgba(15,98,254,.45)", background: "rgba(15,98,254,.1)", color: "#8AADFF" } : { borderRadius: "var(--radius-sm)", border: "1px solid transparent" }}
                      onClick={async () => {
                        await apiFetch(`/applications/${a.id}/tracker`, { method: "PATCH", body: JSON.stringify({ stage: s, reminder_date: reminders[a.id] || null }) });
                        onToast("Application stage updated");
                        const refreshed = await apiFetch(`/apply/history/${encodeURIComponent(user.email)}`);
                        if (!refreshed.error) setApps(refreshed || []);
                      }}>{s}</button>
                  ))}
                </div>

                <div style={{
                  marginTop: 14, padding: "12px 14px", borderRadius: "var(--radius-sm)",
                  background: "rgba(0,0,0,.2)", border: "1px solid var(--border)",
                }}>
                  <div style={{ fontSize: ".72rem", fontWeight: 600, letterSpacing: ".08em", color: "var(--muted)", textTransform: "uppercase", marginBottom: 10 }}>Reminder & notes</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 10, alignItems: "center" }}>
                    <input type="date" aria-label="Reminder date" value={reminders[a.id] || ""} onChange={e => setReminders(r => ({ ...r, [a.id]: e.target.value }))} style={{ flex: "0 0 auto", width: "auto", minWidth: 140, maxWidth: 200 }} />
                    <input placeholder="Add a note…" value={noteDrafts[a.id] || ""} onChange={e => setNoteDrafts(n => ({ ...n, [a.id]: e.target.value }))} style={{ flex: "1 1 200px", minWidth: 0 }} />
                    <button type="button" className="btn-secondary" style={{ whiteSpace: "nowrap", flex: "0 0 auto" }} onClick={async () => {
                      const note = (noteDrafts[a.id] || "").trim();
                      if (!note) return;
                      const res = await apiFetch(`/applications/${a.id}/notes`, { method: "POST", body: JSON.stringify({ note }) });
                      onToast(res.message || "Note added");
                      setNoteDrafts(n => ({ ...n, [a.id]: "" }));
                    }}>Save note</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
      {tab === "alerts" && (
        <div className="card">
          <div className="section-label">Job alert preferences</div>
          <div className="grid-2">
            <div><div className="section-label">Cadence</div><select value={alert.cadence || "weekly"} onChange={e => setAlert(a => ({ ...a, cadence: e.target.value }))}><option>daily</option><option>weekly</option></select></div>
            <div><div className="section-label">Keywords</div><input value={alert.keywords || ""} onChange={e => setAlert(a => ({ ...a, keywords: e.target.value }))} /></div>
          </div>
          <div className="grid-3" style={{ marginTop: 10 }}>
            <div><div className="section-label">Location</div><input value={alert.location || ""} onChange={e => setAlert(a => ({ ...a, location: e.target.value }))} /></div>
            <div><div className="section-label">Work mode</div><input value={alert.work_mode || ""} onChange={e => setAlert(a => ({ ...a, work_mode: e.target.value }))} /></div>
            <div><div className="section-label">Job type</div><input value={alert.job_type || ""} onChange={e => setAlert(a => ({ ...a, job_type: e.target.value }))} /></div>
          </div>
          <div style={{ marginTop: 10 }}>
            <button className="btn-primary" onClick={async () => {
              const res = await apiFetch("/alerts", { method: "POST", body: JSON.stringify({ ...alert, user_id: user.id, is_active: true }) });
              onToast(res.message || "Alert preferences saved");
            }}>Save alerts</button>
            <button className="btn-secondary" style={{ marginLeft: 8 }} onClick={async () => {
              const res = await apiFetch("/alerts/run", { method: "POST" });
              onToast(res.ok
                ? `Alerts: ${res.emails_sent ?? 0} digest(s) sent · ${res.skipped_cadence ?? 0} skipped (cadence) · ${res.skipped_no_new_matches ?? 0} no new listings`
                : "Failed to run alerts");
            }}>Run now</button>
          </div>
        </div>
      )}
      {tab === "profile" && <ResumeProfilePanel user={user} onToast={onToast} setSkills={setSkills} setFilters={setFilters} />}
    </div>
  );
}

function BrowseTab({ onToast, savedJobs, onToggleSave, user, onApplyRecorded }) {
  const [query, setQuery] = useState("");
  const [filters, setFilters] = useState({ location: "Any", work_mode: "Any", job_type: "Any" });
  const [jobs, setJobs] = useState([]);
  const [loading, setLoading] = useState(false);

  async function search(e) {
    e?.preventDefault();
    if (!query.trim()) return;
    setLoading(true);
    const r = await apiFetch("/jobs/search", {
      method: "POST",
      body: JSON.stringify({
        job_title:  query,
        location:   filters.location === "Any" ? null : filters.location,
        work_mode:  filters.work_mode === "Any" ? null : filters.work_mode.toLowerCase(),
        job_type:   filters.job_type === "Any"  ? null : filters.job_type.toLowerCase(),
      }),
    });
    setLoading(false);
    if (!r.error) setJobs(r);
    else onToast("Search error: " + r.error);
  }

  return (
    <div>
      <form onSubmit={search} style={{ display: "flex", flexDirection: "column", gap: 10,
        marginBottom: "1.5rem" }}>
        <input placeholder="Job title (e.g. Data Analyst, React Developer…)"
          value={query} onChange={e => setQuery(e.target.value)} />
        <div className="grid-3">
          {[
            { label: "Location",  key: "location",  opts: ["Any","Mumbai","Bangalore","Delhi","Pune","Hyderabad","Remote"] },
            { label: "Work mode", key: "work_mode", opts: ["Any","Remote","Hybrid","Onsite"] },
            { label: "Job type",  key: "job_type",  opts: ["Any","Full-time","Part-time","Internship","Contract"] },
          ].map(({ label, key, opts }) => (
            <div key={key}>
              <div className="section-label">{label}</div>
              <select value={filters[key]} onChange={e => setFilters(f => ({ ...f, [key]: e.target.value }))}>
                {opts.map(o => <option key={o}>{o}</option>)}
              </select>
            </div>
          ))}
        </div>
        <button type="submit" className="btn-primary"
          style={{ height: 42, width: 140, display: "flex", alignItems: "center",
            justifyContent: "center", gap: 8 }}>
          {loading ? <Spinner /> : "Search"}
        </button>
      </form>

      {jobs.length > 0 ? (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <div className="section-label">{jobs.length} results</div>
          {jobs.map((job, i) => (
            <JobCard key={job.id} job={job}
              isSaved={savedJobs.some(s => s.id === job.id)}
              onToggleSave={onToggleSave}
              user={user}
              onApplyRecorded={onApplyRecorded}
              style={{ animationDelay: Math.min(i, 8) * .05 + "s" }} />
          ))}
        </div>
      ) : (
        !loading && (
          <div style={{ textAlign: "center", padding: "3rem", color: "var(--muted)",
            background: "var(--surface)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
            Search for a job title to browse listings.
          </div>
        )
      )}
    </div>
  );
}

function ResumeProfilePanel({ user, onToast, setSkills, setFilters }) {
  const [resumeFile, setResumeFile] = useState(null);
  const [profile, setProfile] = useState(null);
  const fileInputId = "resume-file-input";

  async function parseResume() {
    if (!resumeFile) return;
    const fd = new FormData();
    fd.append("user_id", String(user.id));
    fd.append("resume_file", resumeFile);
    const r = await apiFetch("/profile/parse_resume", {
      method: "POST",
      body: fd,
    });
    if (r.error) { onToast(r.error); return; }
    setProfile(r.profile || null);
    if (r.profile?.skills?.length) setSkills(r.profile.skills.join(", "));
    onToast("Resume parsed and profile updated");
  }

  async function loadProfile() {
    const r = await apiFetch(`/profile/${user.id}`);
    if (!r.error && r.profile) setProfile(r.profile);
  }

  useEffect(() => { loadProfile(); }, []);

  return (
    <div className="card">
      <div className="section-label">Resume parser</div>
      <div style={{ color: "var(--muted)", fontSize: ".84rem", marginBottom: 8 }}>
        Upload your resume (txt, md, pdf, docx).
      </div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <div className="file-upload-wrap">
          <input
            id={fileInputId}
            className="file-upload-input"
            type="file"
            accept=".txt,.md,.pdf,.docx"
            onChange={e => setResumeFile(e.target.files?.[0] || null)}
          />
          <label htmlFor={fileInputId} className="file-upload-btn">Choose Resume</label>
          <span className="file-upload-name">{resumeFile?.name || "No file selected"}</span>
        </div>
        <button className="btn-primary" onClick={parseResume}>Parse</button>
      </div>
      {profile && (
        <div style={{ marginTop: 12 }}>
          <div className="section-label">Extracted skills</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {(profile.skills || profile.normalized_skills || []).map((s, i) => <span key={i} className="tag">{s}</span>)}
          </div>
          {!!(profile.roles || profile.target_roles)?.length && (
            <>
              <div className="section-label" style={{ marginTop: 10 }}>Inferred roles</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {(profile.roles || profile.target_roles).map((r, i) => <span key={i} className="tag">{r}</span>)}
              </div>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ── Recruiter dashboard ───────────────────────────────────────────────────────
function RecruiterDashboard({ user, onToast }) {
  const [tab, setTab] = useState("post");
  const [jobs, setJobs] = useState([]);
  const [apps, setApps] = useState([]);
  const [form, setForm] = useState({
    job_title:"", location:"", work_mode:"remote", job_type:"full-time",
    description:"", required_skills:"", salary_range:"", apply_link:"",
  });
  const [loading, setLoading] = useState(false);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  async function loadJobs() {
    const r = await apiFetch(`/recruiter/jobs/${user.id}`);
    if (!r.error) setJobs(r);
  }

  async function loadApps() {
    const r = await apiFetch(`/recruiter/candidates/${user.id}`);
    if (!r.error) setApps(r);
  }

  useEffect(() => { loadJobs(); loadApps(); }, []);

  async function postJob(e) {
    e.preventDefault();
    setLoading(true);
    const r = await apiFetch("/recruiter/jobs", {
      method: "POST",
      body: JSON.stringify({ ...form, recruiter_id: user.id }),
    });
    setLoading(false);
    onToast(r.message || (r.ok ? "Job posted!" : "Error posting job"));
    if (r.ok) { loadJobs(); setForm(f => ({ ...f, job_title:"", description:"", required_skills:"" })); }
  }

  async function deleteJob(id) {
    if (!confirm("Delete this job?")) return;
    await apiFetch(`/recruiter/jobs/${id}`, {
      method: "DELETE",
      body: JSON.stringify({ recruiter_id: user.id }),
    });
    loadJobs();
  }

  async function updateStatus(appId, status) {
    const r = await apiFetch(`/recruiter/applications/${appId}`, {
      method: "PATCH",
      body: JSON.stringify({ status, recruiter_id: user.id }),
    });
    onToast(r.message || "Updated");
    loadApps();
  }

  const statusColor = {
    pending:    "#F1C21B", verified: "#42BE65",
    shortlisted:"#BE95FF", rejected: "#FF8389", hired: "#08BDBA",
  };

  return (
    <div className="page">
      {/* Mini stats */}
      <div className="grid-2" style={{ marginBottom: "1.8rem" }}>
        <div className="stat-card"><div className="stat-num">{jobs.length}</div><div className="stat-lbl">Active jobs</div></div>
        <div className="stat-card"><div className="stat-num">{apps.length}</div><div className="stat-lbl">Applications</div></div>
      </div>

      <div className="tab-bar">
        {["post","listings","applications"].map(t => (
          <button key={t} className={`tab ${tab === t ? "active" : ""}`} onClick={() => setTab(t)}>
            {{ post: "Post job", listings: `My listings (${jobs.length})`, applications: `Applicants (${apps.length})` }[t]}
          </button>
        ))}
      </div>

      {/* POST JOB */}
      {tab === "post" && (
        <div className="card">
          <div style={{ fontFamily: "'Bricolage Grotesque',sans-serif", fontWeight: 700,
            fontSize: "1.1rem", marginBottom: "1.2rem" }}>Post a new role</div>
          <form onSubmit={postJob} style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div className="grid-2">
              <div><div className="section-label">Job title *</div>
                <input placeholder="e.g. Senior React Developer" value={form.job_title}
                  onChange={e => set("job_title", e.target.value)} required /></div>
              <div><div className="section-label">Location *</div>
                <input placeholder="e.g. Bangalore or Remote" value={form.location}
                  onChange={e => set("location", e.target.value)} required /></div>
            </div>
            <div className="grid-2">
              <div><div className="section-label">Work mode</div>
                <select value={form.work_mode} onChange={e => set("work_mode", e.target.value)}>
                  {["remote","hybrid","onsite"].map(o => <option key={o}>{o}</option>)}
                </select></div>
              <div><div className="section-label">Job type</div>
                <select value={form.job_type} onChange={e => set("job_type", e.target.value)}>
                  {["full-time","part-time","internship","contract"].map(o => <option key={o}>{o}</option>)}
                </select></div>
            </div>
            <div><div className="section-label">Required skills</div>
              <input placeholder="Python, SQL, Django, REST APIs" value={form.required_skills}
                onChange={e => set("required_skills", e.target.value)} /></div>
            <div className="grid-2">
              <div><div className="section-label">Salary range</div>
                <input placeholder="₹8–12 LPA" value={form.salary_range}
                  onChange={e => set("salary_range", e.target.value)} /></div>
              <div><div className="section-label">Apply link *</div>
                <input placeholder="https://…" value={form.apply_link}
                  onChange={e => set("apply_link", e.target.value)} required /></div>
            </div>
            <div><div className="section-label">Description</div>
              <textarea rows={4} placeholder="Job responsibilities, requirements, perks…"
                value={form.description} onChange={e => set("description", e.target.value)} /></div>
            <button type="submit" className="btn-primary"
              style={{ height: 44, display: "flex", alignItems: "center",
                justifyContent: "center", gap: 8, width: 160 }}>
              {loading ? <Spinner /> : "Publish job"}
            </button>
          </form>
        </div>
      )}

      {/* LISTINGS */}
      {tab === "listings" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {jobs.length === 0 ? (
            <div style={{ textAlign: "center", padding: "3rem", color: "var(--muted)",
              background: "var(--surface)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
              You haven't posted any jobs yet.
            </div>
          ) : jobs.map((job, i) => (
            <div key={job.id} className="card fade-up"
              style={{ animationDelay: i * .06 + "s", display: "flex",
                justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
              <div>
                <div style={{ fontFamily: "'Bricolage Grotesque',sans-serif", fontWeight: 700 }}>
                  {job.job_title}
                </div>
                <div style={{ color: "var(--muted)", fontSize: ".85rem", marginTop: 3 }}>
                  {job.location} · <WorkBadge mode={job.work_mode} />
                </div>
                {job.required_skills && (
                  <div style={{ marginTop: 6, display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {job.required_skills.split(/[,;]+/).slice(0,5).map((s,j) => (
                      <SkillTag key={j} label={s.trim()} />
                    ))}
                  </div>
                )}
              </div>
              <button onClick={() => deleteJob(job.id)}
                style={{ background: "rgba(218,30,40,.1)", border: "1px solid rgba(218,30,40,.3)",
                  color: "#FF8389", borderRadius: 8, padding: ".4rem .9rem", fontSize: ".8rem",
                  fontWeight: 600, flexShrink: 0 }}>
                Delete
              </button>
            </div>
          ))}
        </div>
      )}

      {/* APPLICATIONS */}
      {tab === "applications" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {apps.length === 0 ? (
            <div style={{ textAlign: "center", padding: "3rem", color: "var(--muted)",
              background: "var(--surface)", borderRadius: "var(--radius)", border: "1px solid var(--border)" }}>
              No applications yet.
            </div>
          ) : apps.map((app, i) => (
            <div key={app.id} className="card fade-up"
              style={{ animationDelay: i * .05 + "s" }}>
              <div style={{ display: "flex", justifyContent: "space-between",
                alignItems: "flex-start", gap: 12, flexWrap: "wrap" }}>
                <div>
                  <div style={{ fontWeight: 700, fontFamily: "'Bricolage Grotesque',sans-serif" }}>
                    {app.applicant_name}
                  </div>
                  <div style={{ color: "var(--muted)", fontSize: ".85rem" }}>{app.applicant_email}</div>
                  <div style={{ color: "var(--muted)", fontSize: ".8rem", marginTop: 3 }}>
                    Applied for: <b style={{ color: "var(--text)" }}>{app.job_title}</b>
                  </div>
                  <div style={{ color: "#08BDBA", fontSize: ".78rem", marginTop: 4 }}>
                    Candidate fit: {app.fit_score ?? 0}% {app.matched_skills?.length ? `· matched: ${app.matched_skills.join(", ")}` : ""}
                  </div>
                  {!!app.missing_skills?.length && (
                    <div style={{ color: "#FFB000", fontSize: ".75rem", marginTop: 3 }}>
                      Missing: {app.missing_skills.join(", ")}
                    </div>
                  )}
                </div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                  <span style={{ background: "rgba(255,255,255,.05)",
                    border: "1px solid var(--border)", borderRadius: 999,
                    fontSize: ".75rem", padding: ".2rem .75rem",
                    color: statusColor[app.status] || "var(--muted)", fontWeight: 600 }}>
                    ● {app.status}
                  </span>
                  {["shortlisted","rejected","hired"].map(s => (
                    <button key={s} onClick={() => updateStatus(app.id, s)}
                      style={{ background: "var(--surface-2)", border: "1px solid var(--border)",
                        color: "var(--muted)", borderRadius: 6, padding: ".3rem .7rem",
                        fontSize: ".75rem", fontWeight: 600, textTransform: "capitalize" }}>
                      {s}
                    </button>
                  ))}
                </div>
              </div>
              {app.resume_text && (
                <div style={{ marginTop: 10, padding: ".7rem .9rem", background: "var(--surface-2)",
                  borderRadius: 8, fontSize: ".8rem", color: "var(--muted)", lineHeight: 1.6 }}>
                  <b style={{ color: "var(--text)" }}>Resume:</b> {app.resume_text.slice(0, 200)}…
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Navbar ────────────────────────────────────────────────────────────────────
function Navbar({ user, onLogout }) {
  return (
    <nav className="nav">
      <span className="nav-brand">SkillMatch</span>
      {user && (
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: ".85rem", color: "var(--muted)" }}>
            {user.name}
          </span>
          <span style={{ background: "rgba(15,98,254,.12)", border: "1px solid rgba(15,98,254,.25)",
            borderRadius: 999, padding: ".2rem .8rem", fontSize: ".72rem",
            color: "#7EB3FF", fontWeight: 700, letterSpacing: ".08em", textTransform: "uppercase" }}>
            {user.role === "recruiter" ? "Recruiter" : "Job Seeker"}
          </span>
          <button className="btn-ghost" onClick={onLogout}
            style={{ fontSize: ".82rem", border: "1px solid var(--border)", borderRadius: 8 }}>
            Sign out
          </button>
        </div>
      )}
    </nav>
  );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser]   = useState(null);
  const [token, setToken] = useState(null);
  const [toast, setToast] = useState(null);
  const [savedJobs, setSavedJobs] = useState([]);

  function onLogin(u, t) { setUser(u); setToken(t); }
  function onLogout()    { setUser(null); setToken(null); setSavedJobs([]); }
  function onToast(msg)  { setToast(msg); }
  async function onToggleSave(job) {
    if (!user?.id || !job?.id) return;
    if (!job?.id) return;
    const exists = savedJobs.some(j => j.id === job.id);
    if (exists) {
      await apiFetch("/saved_jobs", { method: "DELETE", body: JSON.stringify({ user_id: user.id, job_id: job.id }) });
      setSavedJobs(prev => prev.filter(j => j.id !== job.id));
      onToast("Removed from saved");
    } else {
      await apiFetch("/saved_jobs", { method: "POST", body: JSON.stringify({ user_id: user.id, job_id: job.id }) });
      setSavedJobs(prev => [job, ...prev]);
      onToast("Saved job");
    }
  }

  useEffect(() => {
    async function loadSaved() {
      if (!user?.id || user.role !== "job_seeker") return;
      const r = await apiFetch(`/saved_jobs/${user.id}`);
      if (!r.error) setSavedJobs(r || []);
    }
    loadSaved();
  }, [user?.id, user?.role]);

  return (
    <>
      <Navbar user={user} onLogout={onLogout} />
      {!user ? (
        <AuthPage onLogin={onLogin} />
      ) : user?.role === "recruiter" ? (
        <RecruiterDashboard user={user} onToast={onToast} />
      ) : (
        <SeekerDashboard
          user={user}
          onToast={onToast}
          savedJobs={savedJobs}
          onToggleSave={onToggleSave}
        />
      )}
      {toast && <Toast msg={toast} onClose={() => setToast(null)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
